services:
  backend:
    build: ./backend/backend
    container_name: inuni-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DB_HOST=host.docker.internal
      - DB_PORT=5433
      - DB_NAME=inuni
      - DB_USER=postgres
      - DB_PASSWORD=dreamteam
      - PORT=8080
    depends_on: []
    volumes:
      - ./backend/backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    networks:
      - inuni-net

  frontend:
    build: ./inuni-frontend
    container_name: inuni-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inuni-net

networks:
  inuni-net:
    driver: bridge

volumes:
  uploads_data: